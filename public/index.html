  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WK 2026">

  <style>
    :root {
      --bg: #f8f8f6;
      --bg2: #ffffff;
      --bg3: #f1f0ec;
      --text: #1a1a18;
      --text2: #6b6b67;
      --text3: #a0a09c;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --accent: #0f5fa5;
      --accent-bg: #e6f1fb;
      --accent-text: #0c447c;
      --green: #0f6e56;
      --green-bg: #e1f5ee;
      --green-text: #085041;
      --gold: #ba7517;
      --radius: 10px;
      --radius-sm: 6px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #16161a;
        --bg2: #1e1e24;
        --bg3: #121216;
        --text: #e8e8e4;
        --text2: #9a9a96;
        --text3: #5a5a58;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.18);
        --accent: #378add;
        --accent-bg: #0c2a45;
        --accent-text: #85b7eb;
        --green: #1d9e75;
        --green-bg: #063320;
        --green-text: #5dcaa5;
        --gold: #ef9f27;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
    }
    header {
      background: var(--bg2);
      border-bottom: 0.5px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    header p { font-size: 12px; color: var(--text2); }
    .refresh-btn {
      margin-left: auto;
      background: none;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      cursor: pointer;
      color: var(--text2);
      font-size: 14px;
    }
    .refresh-btn:hover { background: var(--bg3); }
    nav {
      display: flex;
      background: var(--bg2);
      border-bottom: 0.5px solid var(--border);
      overflow-x: auto;
    }
    nav button {
      flex: 1;
      min-width: 0;
      padding: 11px 8px;
      border: none;
      background: none;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s;
    }
    nav button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 500;
    }
    main { max-width: 640px; margin: 0 auto; padding: 16px; }
    .page { display: none; }
    .page.active { display: block; }
    .info-box {
      background: var(--bg3);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .info-box strong { color: var(--text); }
    .row { display: flex; gap: 8px; margin-bottom: 12px; }
    input[type=text], input[type=number], select {
      width: 100%;
      padding: 9px 12px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--bg2);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input:focus, select:focus { border-color: var(--accent); }
    button.primary {
      padding: 9px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
    }
    button.primary:hover { opacity: 0.9; }
    button.primary:active { transform: scale(0.98); }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 13px;
    }
    .chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text2);
      font-size: 16px;
      line-height: 1;
      padding: 0;
    }
    .chip button:hover { color: var(--text); }
    .phase-bar { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
    .ph {
      padding: 5px 12px;
      border: 0.5px solid var(--border2);
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      background: var(--bg2);
      color: var(--text2);
      font-family: inherit;
    }
    .ph.active {
      background: var(--accent-bg);
      color: var(--accent-text);
      border-color: var(--accent);
      font-weight: 500;
    }
    .date-hdr {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .07em;
      padding: 4px 0;
      border-bottom: 0.5px solid var(--border);
      margin: 16px 0 8px;
    }
    .date-hdr:first-child { margin-top: 0; }
    .card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .card-meta span { font-size: 11px; color: var(--text3); }
    .match-grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
    }
    .team { font-size: 14px; font-weight: 500; }
    .team.right { text-align: right; }
    .score-inputs { display: flex; align-items: center; gap: 4px; }
    .score-inputs input {
      width: 42px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      padding: 6px 4px;
    }
    .score-sep { color: var(--text3); font-size: 15px; }
    .saved-msg {
      font-size: 11px;
      color: var(--green);
      text-align: center;
      height: 16px;
      margin-top: 5px;
    }
    .badge {
      display: inline-block;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
    }
    .badge-exact { background: var(--green-bg); color: var(--green-text); }
    .badge-win { background: var(--accent-bg); color: var(--accent-text); }
    .badge-zero { background: var(--bg3); color: var(--text3); }
    .ranking-table {
      width: 100%;
      border-collapse: collapse;
    }
    .ranking-table th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      border-bottom: 0.5px solid var(--border);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .ranking-table td {
      padding: 12px 12px;
      border-bottom: 0.5px solid var(--border);
    }
    .ranking-table tr:last-child td { border-bottom: none; }
    .rank-wrap {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .pts-cell { text-align: right; font-size: 18px; font-weight: 700; }
    .stat-chips { font-size: 12px; color: var(--text2); }
    .loading {
      text-align: center;
      padding: 2.5rem;
      color: var(--text2);
      font-size: 14px;
    }
    .error {
      background: #fef2f2;
      color: #a32d2d;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    @media (prefers-color-scheme: dark) {
      .error { background: #2d1010; color: #f09595; }
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .player-select { margin-bottom: 14px; }
    .player-select label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 5px; }
  </style>

      {id:'m101',date:'2026-07-14',h:'W97',a:'W98',ph:'sf'},
      {id:'m102',date:'2026-07-15',h:'W99',a:'W100',ph:'sf'},
      {id:'m103',date:'2026-07-18',h:'L101',a:'L102',ph:'final'},
      {id:'m104',date:'2026-07-19',h:'W101',a:'W102',ph:'final'},
    ];

    let players = [], results = {}, curPreds = {}, curPhaseV = 'group', curPhaseS = 'group';
    let savingTimer = {};

    async function apiFetch(path, opts = {}) {
      const res = await fetch(API + path, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      });
      if (!res.ok) {
        const e = await res.json().catch(() => ({ error: 'Serverfout' }));
        throw new Error(e.error || 'Fout');
      }
      return res.json();
    }

    async function loadAll() {
      try {
        [players, results] = await Promise.all([
          apiFetch('/players'),
          apiFetch('/results'),
        ]);
        renderCurrent();
      } catch (e) {
        showError(e.message);
      }
    }

    function showError(msg) {
      let el = document.getElementById('global-err');
      if (!el) {
        el = document.createElement('div');
        el.id = 'global-err';
        el.className = 'error';
        document.querySelector('main').prepend(el);
      }
      el.textContent = '⚠ ' + msg;
      setTimeout(() => el.remove(), 4000);
    }

    let curPage = 'spelers';
    function nav(page) {
      curPage = page;
      document.querySelectorAll('nav button').forEach((b, i) =>
        b.classList.toggle('active', ['spelers','voorspel','scores','ranking'][i] === page));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      renderCurrent();
    }

    function renderCurrent() {
      if (curPage === 'spelers')   renderPlayers();
      if (curPage === 'voorspel')  renderPredPage();
      if (curPage === 'scores')    renderScoresPage();
      if (curPage === 'ranking')   renderRanking();
    }

    function renderPlayers() {
      document.getElementById('chips').innerHTML = players.map(p =>
        `<span class="chip">${esc(p)}<button onclick="removePlayer('${esc(p)}')" title="Verwijder">×</button></span>`
      ).join('');
      document.getElementById('player-status').textContent =
        players.length ? `${players.length} speler${players.length !== 1 ? 's' : ''} toegevoegd` : 'Nog geen spelers.';
    }

    async function addPlayer() {
      const inp = document.getElementById('inp-player');
      const name = inp.value.trim();
      if (!name) return;
      inp.value = '';
      try {
        await apiFetch('/players', { method: 'POST', body: JSON.stringify({ name }) });
        players.push(name);
        renderPlayers();
      } catch (e) { showError(e.message); }
    }

    async function removePlayer(name) {
      if (!confirm(`"${name}" verwijderen?`)) return;
      try {
        await apiFetch('/players/' + encodeURIComponent(name), { method: 'DELETE' });
        players = players.filter(p => p !== name);
        renderPlayers();
      } catch (e) { showError(e.message); }
    }

    function renderPhaseBtns(containerId, active, setter) {
      document.getElementById(containerId).innerHTML = PHASES.map(ph =>
        `<button class="ph${active === ph.id ? ' active' : ''}" onclick="${setter}('${ph.id}')">${ph.label}</button>`
      ).join('');
    }

    async function renderPredPage() {
      const sel = document.getElementById('sel-player');
      const prev = sel.value;
      sel.innerHTML = players.length
        ? players.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('')
        : '<option value="">— voeg eerst spelers toe —</option>';
      if (prev && players.includes(prev)) sel.value = prev;
      renderPhaseBtns('phase-bar-v', curPhaseV, 'setPhaseV');
      await loadPredictions();
    }

    async function loadPredictions() {
      const player = document.getElementById('sel-player').value;
      const wrap = document.getElementById('matches-wrap');
      if (!player) { wrap.innerHTML = ''; return; }
      wrap.innerHTML = '<div class="loading"><span class="spinner"></span>Laden...</div>';
      try {
        curPreds = await apiFetch('/predictions?player=' + encodeURIComponent(player));
        renderMatchList(wrap, player);
      } catch (e) { wrap.innerHTML = `<div class="error">${e.message}</div>`; }
    }

    function setPhaseV(ph) { curPhaseV = ph; renderPredPage(); }
    function setPhaseS(ph) { curPhaseS = ph; renderScoresPage(); }

    function renderMatchList(wrap, player) {
      const filtered = MATCHES.filter(m => m.ph === curPhaseV);
      const byDate = {};
      filtered.forEach(m => (byDate[m.date] = byDate[m.date] || []).push(m));
      wrap.innerHTML = Object.entries(byDate).sort(([a],[b]) => a < b ? -1 : 1).map(([date, ms]) => {
        const d = new Date(date + 'T12:00:00');
        const lbl = `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
        return `<div class="date-hdr">${lbl}</div>` + ms.map(m => {
          const pred = curPreds[m.id] || {};
          const res  = results[m.id];
          let badge = '';
          if (res && pred.h != null) {
            const p = calcPts(pred, res);
            badge = p === 3 ? '<span class="badge badge-exact">3 pt</span>'
                  : p === 1 ? '<span class="badge badge-win">1 pt</span>'
                  : '<span class="badge badge-zero">0 pt</span>';
          }
          const phLbl = m.ph === 'group' ? `Groep ${m.g}` : PHASES.find(p => p.id === m.ph)?.label || '';
          return `<div class="card">
            <div class="card-meta"><span>${phLbl}</span>${badge}</div>
            <div class="match-grid">
              <div class="team">${esc(m.h)}</div>
              <div class="score-inputs">
                <input type="number" min="0" max="20" value="${pred.h != null ? pred.h : ''}" placeholder="–"
                  id="v_${m.id}_h" onchange="queueSavePred('${esc(player)}','${m.id}')">
                <span class="score-sep">–</span>
                <input type="number" min="0" max="20" value="${pred.a != null ? pred.a : ''}" placeholder="–"
                  id="v_${m.id}_a" onchange="queueSavePred('${esc(player)}','${m.id}')">
              </div>
              <div class="team right">${esc(m.a)}</div>
            </div>
            <div class="saved-msg" id="sv_${m.id}"></div>
          </div>`;
        }).join('');
      }).join('');
    }

    function queueSavePred(player, mid) {
      clearTimeout(savingTimer[mid]);
      savingTimer[mid] = setTimeout(() => savePred(player, mid), 600);
    }

    async function savePred(player, mid) {
      const h = document.getElementById(`v_${mid}_h`)?.value;
      const a = document.getElementById(`v_${mid}_a`)?.value;
      if (h === '' || a === '') return;
      try {
        await apiFetch('/predictions', { method: 'PUT', body: JSON.stringify({ player, matchId: mid, h: +h, a: +a }) });
        curPreds[mid] = { h: +h, a: +a };
        const sv = document.getElementById(`sv_${mid}`);
        if (sv) { sv.textContent = '✓ Opgeslagen'; setTimeout(() => { if (sv) sv.textContent = ''; }, 2000); }
      } catch (e) { showError(e.message); }
    }

    function renderScoresPage() {
      renderPhaseBtns('phase-bar-s', curPhaseS, 'setPhaseS');
      const filtered = MATCHES.filter(m => m.ph === curPhaseS);
      const byDate = {};
      filtered.forEach(m => (byDate[m.date] = byDate[m.date] || []).push(m));
      document.getElementById('scores-wrap').innerHTML = Object.entries(byDate).sort(([a],[b]) => a < b ? -1 : 1).map(([date, ms]) => {
        const d = new Date(date + 'T12:00:00');
        const lbl = `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
        return `<div class="date-hdr">${lbl}</div>` + ms.map(m => {
          const res = results[m.id] || {};
          return `<div class="card">
            <div class="match-grid">
              <div class="team">${esc(m.h)}</div>
              <div class="score-inputs">
                <input type="number" min="0" max="20" value="${res.h != null ? res.h : ''}" placeholder="–"
                  id="r_${m.id}_h" onchange="queueSaveResult('${m.id}')">
                <span class="score-sep">–</span>
                <input type="number" min="0" max="20" value="${res.a != null ? res.a : ''}" placeholder="–"
                  id="r_${m.id}_a" onchange="queueSaveResult('${m.id}')">
              </div>
              <div class="team right">${esc(m.a)}</div>
            </div>
            <div class="saved-msg" id="sr_${m.id}"></div>
          </div>`;
        }).join('');
      }).join('');
    }

    function queueSaveResult(mid) {
      clearTimeout(savingTimer['r_' + mid]);
      savingTimer['r_' + mid] = setTimeout(() => saveResult(mid), 600);
    }

    async function saveResult(mid) {
      const h = document.getElementById(`r_${mid}_h`)?.value;
      const a = document.getElementById(`r_${mid}_a`)?.value;
      if (h === '' || a === '') return;
      try {
        await apiFetch('/results', { method: 'PUT', body: JSON.stringify({ matchId: mid, h: +h, a: +a }) });
        results[mid] = { h: +h, a: +a };
        const sv = document.getElementById(`sr_${mid}`);
        if (sv) { sv.textContent = '✓ Opgeslagen'; setTimeout(() => { if (sv) sv.textContent = ''; }, 2000); }
      } catch (e) { showError(e.message); }
    }

    async function renderRanking() {
      const wrap = document.getElementById('ranking-wrap');
      wrap.innerHTML = '<div class="loading"><span class="spinner"></span>Berekenen...</div>';
      try {
        const ranking = await apiFetch('/ranking');
        if (!ranking.length) { wrap.innerHTML = '<div class="loading">Nog geen spelers.</div>'; return; }
        const medals = ['🥇','🥈','🥉'];
        wrap.innerHTML = `<div class="rank-wrap"><table class="ranking-table">
          <thead><tr><th>#</th><th>Naam</th><th>Stat</th><th style="text-align:right">Punten</th></tr></thead>
          <tbody>${ranking.map((r, i) => `<tr>
            <td style="font-size:18px">${i < 3 ? medals[i] : i + 1}</td>
            <td style="font-weight:${i === 0 ? '600' : '400'}">${esc(r.name)}</td>
            <td class="stat-chips">
              ${r.filled} voorsp. &nbsp;
              <span class="badge badge-exact">${r.exact}×3</span>
              <span class="badge badge-win">${r.win}×1</span>
            </td>
            <td class="pts-cell">${r.pts}</td>
          </tr>`).join('')}</tbody>
        </table></div>`;
      } catch (e) { wrap.innerHTML = `<div class="error">${e.message}</div>`; }
    }

    function calcPts(pred, res) {
      if (pred.h == null || pred.a == null || res.h == null || res.a == null) return 0;
      if (pred.h === res.h && pred.a === res.a) return 3;
      const pw = pred.h > pred.a ? 1 : pred.h < pred.a ? -1 : 0;
      const rw = res.h  > res.a  ? 1 : res.h  < res.a  ? -1 : 0;
      return pw === rw ? 1 : 0;
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    loadAll();
  </script>
</body>
</html>
