<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WK 2026 Pronostieken</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A2240">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="WK 2026">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    :root{
      --navy:#0A2240;--navy2:#0d2d54;--red:#D2001E;--red-bg:#fdf0f2;--red-text:#a8001a;
      --green:#009A44;--green-bg:#edf9f2;--green-text:#006e30;--gold:#C9A84C;
      --bg:#f5f7fa;--bg2:#ffffff;--bg3:#eef1f6;--text:#0d1b2e;--text2:#4a5a70;--text3:#8a9ab0;
      --border:rgba(10,34,64,0.10);--border2:rgba(10,34,64,0.18);
      --accent:#0A2240;--accent-bg:#e6ecf5;--accent-text:#0A2240;
      --radius:10px;--radius-sm:6px;
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#0d1520;--bg2:#111e2e;--bg3:#0a1220;--text:#e4eaf4;--text2:#7a90aa;--text3:#445566;
      --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
      --accent:#3a7bd5;--accent-bg:#0d2040;--accent-text:#7ab0f0;
      --red-bg:#2a0a10;--red-text:#f08090;--green-bg:#06200f;--green-text:#50d080;
    }}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}

    /* ── AUTH SCHERM ── */
    .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--navy)}
    .auth-card{background:#ffffff;border-radius:16px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
    .auth-logo{text-align:center;margin-bottom:20px}
    .auth-logo img{width:70px;height:70px;object-fit:contain}
    .auth-logo h1{font-size:18px;font-weight:700;color:#0A2240;margin-top:8px}
    .auth-logo p{font-size:12px;color:#8a9ab0;margin-top:2px}
    .auth-tabs{display:flex;background:#eef1f6;border-radius:var(--radius-sm);padding:3px;margin-bottom:20px}
    .auth-tab{flex:1;padding:8px;text-align:center;border:none;background:none;font-size:13px;font-weight:500;color:#4a5a70;cursor:pointer;border-radius:var(--radius-sm);font-family:inherit}
    .auth-tab.active{background:#ffffff;color:#0A2240;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
    .auth-field{margin-bottom:14px}
    .auth-field label{display:block;font-size:12px;font-weight:600;color:#4a5a70;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
    .auth-field input{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:#f5f7fa;color:#0d1b2e;font-size:14px;-webkit-text-fill-color:#0d1b2e;font-family:inherit;outline:none}
    .auth-field input:focus{border-color:#0A2240;background:#fff;color:#0d1b2e;-webkit-text-fill-color:#0d1b2e}
    .auth-field input::-webkit-input-placeholder{color:#8a9ab0}
    .auth-field input:-webkit-autofill{-webkit-box-shadow:0 0 0 30px #f5f7fa inset!important;-webkit-text-fill-color:#0d1b2e!important}
    .auth-btn{width:100%;padding:12px;background:#0A2240;color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
    .auth-btn:hover{opacity:0.9}
    .auth-error{background:var(--red-bg);color:var(--red-text);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;margin-bottom:12px;display:none}
    .auth-error.show{display:block}

    /* ── APP ── */
    header{background:var(--navy);padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    .logo-wrap{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
    .logo-svg{width:40px;height:40px;flex-shrink:0;object-fit:contain}
    .header-text h1{font-size:15px;font-weight:700;color:#fff}
    .header-text p{font-size:11px;color:rgba(255,255,255,0.5);margin-top:1px}
    .header-right{display:flex;align-items:center;gap:8px}
    .user-badge{font-size:13px;color:rgba(255,255,255,0.85);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
    .logout-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius-sm);padding:6px 10px;cursor:pointer;color:rgba(255,255,255,0.7);font-size:12px;font-family:inherit;white-space:nowrap}
    .refresh-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:var(--radius-sm);padding:7px 10px;cursor:pointer;color:rgba(255,255,255,0.8);font-size:14px}
    nav{display:flex;background:var(--navy2);overflow-x:auto;border-bottom:2px solid rgba(255,255,255,0.06)}
    nav button{flex:1;min-width:0;padding:11px 6px;border:none;background:none;color:rgba(255,255,255,0.45);font-size:11px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;font-family:inherit;letter-spacing:.04em;text-transform:uppercase}
    nav button.active{color:#fff;border-bottom-color:var(--gold)}
    nav button:hover:not(.active){color:rgba(255,255,255,0.75)}
    main{max-width:640px;margin:0 auto;padding:16px}
    .page{display:none}.page.active{display:block}
    .info-box{background:var(--accent-bg);border-left:3px solid var(--navy);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.7}
    .info-box strong{color:var(--text)}
    input[type=text],input[type=number],input[type=email],input[type=password],select{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit;outline:none}
    input[type=number]{-moz-appearance:textfield}
    input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    input:focus,select:focus{border-color:var(--navy)}
    input:disabled,select:disabled{opacity:0.5;cursor:not-allowed;background:var(--bg3)}
    button.primary{padding:9px 18px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
    button.primary:hover{opacity:0.85}
    .phase-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
    .ph{padding:5px 12px;border:1px solid var(--border2);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;background:var(--bg2);color:var(--text2);font-family:inherit}
    .ph.active{background:var(--navy);color:#fff;border-color:var(--navy)}
    .ph:hover:not(.active){border-color:var(--navy);color:var(--navy)}
    .date-hdr{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:4px 0;border-bottom:1px solid var(--border);margin:16px 0 8px}
    .date-hdr:first-child{margin-top:0}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px}
    .card.locked{background:var(--bg3)}
    .card-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .card-meta-left{display:flex;align-items:center;gap:6px}
    .card-meta span{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
    .lock-icon{font-size:11px}
    .kickoff-time{font-size:11px;color:var(--text3);font-weight:500}
    .match-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
    .team{font-size:14px;font-weight:600;color:var(--text)}
    .team.right{text-align:right}
    .score-inputs{display:flex;align-items:center;gap:4px}
    .score-inputs input{width:44px;text-align:center;font-size:16px;font-weight:700;padding:6px 4px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3)}
    .score-inputs input:focus{border-color:var(--navy);background:var(--bg2)}
    .score-sep{color:var(--text3);font-size:16px;font-weight:700;padding:0 2px}
    .saved-msg{font-size:11px;color:var(--green);text-align:center;height:16px;margin-top:5px;font-weight:500}
    .badge{display:inline-block;border-radius:4px;font-size:11px;font-weight:700;padding:2px 8px}
    .badge-exact{background:var(--green-bg);color:var(--green-text)}
    .badge-win{background:var(--accent-bg);color:var(--accent-text)}
    .badge-zero{background:var(--bg3);color:var(--text3)}
    .badge-bonus{background:#fff8e6;color:#7a5000}
    @media(prefers-color-scheme:dark){.badge-bonus{background:#2a1f00;color:#e8c06a}}
    .rank-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
    .ranking-table{width:100%;border-collapse:collapse}
    .ranking-table th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.07em}
    .ranking-table td{padding:13px 14px;border-bottom:1px solid var(--border)}
    .ranking-table tr:last-child td{border-bottom:none}
    .pts-cell{text-align:right;font-size:20px;font-weight:800;color:var(--navy)}
    @media(prefers-color-scheme:dark){.pts-cell{color:var(--accent)}}
    .stat-chips{font-size:12px;color:var(--text2);line-height:2;display:flex;flex-wrap:wrap;gap:3px;align-items:center}
    .loading{text-align:center;padding:2.5rem;color:var(--text2);font-size:14px}
    .error{background:var(--red-bg);color:var(--red-text);border-radius:var(--radius-sm);border-left:3px solid var(--red);padding:10px 14px;font-size:13px;margin-bottom:12px}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--navy);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .bonus-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
    .bonus-card h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px}
    .bonus-field{margin-bottom:10px}
    .bonus-field label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
    .bonus-pts-info{font-size:11px;color:var(--text3);margin-top:3px}
    .bonus-saved{font-size:12px;color:var(--green);font-weight:500;height:18px;margin-top:6px}
    .standings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
    .standings-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:4px}
    .standings-card h3{font-size:12px;font-weight:700;color:#fff;background:var(--navy);padding:8px 12px;letter-spacing:.06em;text-transform:uppercase}
    .standings-tbl{width:100%;border-collapse:collapse;font-size:12px}
    .standings-tbl th{padding:5px 8px;font-size:10px;font-weight:700;color:var(--text3);border-bottom:1px solid var(--border);text-align:right;text-transform:uppercase;letter-spacing:.05em}
    .standings-tbl th:first-child{text-align:left}
    .standings-tbl td{padding:6px 8px;border-bottom:1px solid var(--border);text-align:right;color:var(--text2)}
    .standings-tbl td:first-child{text-align:left;font-weight:600;color:var(--text)}
    .standings-tbl tr:last-child td{border-bottom:none}
    .standings-tbl tr.qualified td{color:var(--green)}
    .pos-badge{display:inline-block;width:16px;height:16px;border-radius:50%;font-size:10px;font-weight:700;line-height:16px;text-align:center;margin-right:4px}
    .pos-1{background:var(--green-bg);color:var(--green-text)}
    .pos-2{background:var(--accent-bg);color:var(--accent-text)}
  </style>
</head>
<body>

<!-- AUTH SCHERM -->
<div id="auth-screen" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="/logo.png" alt="WK 2026">
      <h1>WK 2026 Pronostieken</h1>
      <p>by DUUUB</p>
    </div>
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Inloggen</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Registreren</button>
    </div>
    <div id="auth-login">
      <div class="auth-field"><label>Email</label><input type="email" id="l-email" placeholder="jouw@email.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="auth-field"><label>Wachtwoord</label><input type="password" id="l-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="auth-btn" onclick="doLogin()">Inloggen</button>
    </div>
    <div id="auth-register" style="display:none">
      <div class="auth-field"><label>Naam</label><input type="text" id="r-name" placeholder="Jouw naam" maxlength="25" onkeydown="if(event.key==='Enter')doRegister()"></div>
      <div class="auth-field"><label>Email</label><input type="email" id="r-email" placeholder="jouw@email.com" onkeydown="if(event.key==='Enter')doRegister()"></div>
      <div class="auth-field"><label>Wachtwoord</label><input type="password" id="r-password" placeholder="Min. 4 tekens" onkeydown="if(event.key==='Enter')doRegister()"></div>
      <button class="auth-btn" onclick="doRegister()">Registreren</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" style="display:none">
  <header>
    <div class="logo-wrap">
      <img src="/logo.png" class="logo-svg" alt="WK 2026">
      <div class="header-text">
        <h1>WK 2026 Pronostieken</h1>
        <p>FIFA World Cup United 2026 · by DUUUB</p>
      </div>
    </div>
    <span class="user-badge" id="user-badge"></span>
  </header>
  <nav id="main-nav">
    <button class="active" onclick="nav('pronostiek')">Pronostiek</button>
    <button onclick="nav('standen')">Standen</button>
    <button onclick="nav('ranking')">Ranking</button>
  </nav>
  <main>
    <div id="page-pronostiek" class="page active">
      <div class="phase-bar" id="phase-bar-v"></div>
      <div id="matches-wrap"></div>
    </div>
    <div id="page-standen" class="page">
      <div id="standen-wrap"></div>
    </div>
    <div id="page-scores" class="page">
      <div class="info-box">Vul hier de officiële uitslagen in. Enkel zichtbaar voor admin.</div>
      <div class="phase-bar" id="phase-bar-s"></div>
      <div id="scores-wrap"></div>
    </div>
    <div id="page-ranking" class="page">
      <div id="ranking-wrap"></div>
    </div>
  </main>
</div>

  let token=localStorage.getItem('wk26_token')||'';
  let currentUser=null;

  function isLocked(ko){return Date.now()>=ko;}

  // ── API ────────────────────────────────────────────────
  async function apiFetch(path,opts={}){
    const headers={'Content-Type':'application/json'};
    if(token)headers['Authorization']='Bearer '+token;
    const res=await fetch(API+path,{headers,...opts});
    if(!res.ok){const e=await res.json().catch(()=>({error:'Serverfout'}));throw new Error(e.error||'Fout');}
    return res.json();
  }

  // ── AUTH ───────────────────────────────────────────────
  function switchAuthTab(tab){
    document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('active',['login','register'][i]===tab));
    document.getElementById('auth-login').style.display=tab==='login'?'block':'none';
    document.getElementById('auth-register').style.display=tab==='register'?'block':'none';
    document.getElementById('auth-error').classList.remove('show');
  }

  function showAuthError(msg){const el=document.getElementById('auth-error');el.textContent=msg;el.classList.add('show');}

  async function doLogin(){
    const email=document.getElementById('l-email').value.trim();
    const password=document.getElementById('l-password').value;
    if(!email||!password){showAuthError('Vul email en wachtwoord in');return;}
    try{
      const data=await apiFetch('/auth/login',{method:'POST',body:JSON.stringify({email,password})});
      token=data.token;localStorage.setItem('wk26_token',token);
      currentUser={name:data.name,email:data.email,isAdmin:data.isAdmin};
      showApp();
    }catch(e){showAuthError(e.message);}
  }

  async function doRegister(){
    const name=document.getElementById('r-name').value.trim();
    const email=document.getElementById('r-email').value.trim();
    const password=document.getElementById('r-password').value;
    if(!name||!email||!password){showAuthError('Vul alle velden in');return;}
    try{
      const data=await apiFetch('/auth/register',{method:'POST',body:JSON.stringify({name,email,password})});
      token=data.token;localStorage.setItem('wk26_token',token);
      currentUser={name:data.name,email:data.email,isAdmin:data.isAdmin};
      showApp();
    }catch(e){showAuthError(e.message);}
  }

  async function doLogout(){
    try{await apiFetch('/auth/logout',{method:'POST'});}catch{}
    token='';localStorage.removeItem('wk26_token');currentUser=null;
    document.getElementById('app-screen').style.display='none';
    document.getElementById('auth-screen').style.display='flex';
  }

  function showApp(){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    document.getElementById('user-badge').textContent=currentUser.name;
    // Toon Scores tab enkel voor admin
    const nav=document.getElementById('main-nav');
    if(currentUser.isAdmin&&!document.getElementById('nav-scores')){
      const btn=document.createElement('button');
      btn.id='nav-scores';btn.textContent='Scores';btn.onclick=()=>nav_('scores');
      nav.appendChild(btn);
    }
    loadAll();
  }

  // ── APP INIT ───────────────────────────────────────────
  async function init(){
    if(token){
      try{
        const me=await apiFetch('/auth/me');
        currentUser={name:me.name,email:me.email,isAdmin:me.isAdmin};
        showApp();
      }catch{token='';localStorage.removeItem('wk26_token');}
    }
  }

  async function loadAll(){
    try{
      [results,bonusResult]=await Promise.all([apiFetch('/results'),apiFetch('/bonus-result')]);
      try{const s=await apiFetch('/standings');bracket=s.bracket||{};}catch{}
      renderCurrent();
    }catch(e){showError(e.message);}
  }

  function showError(msg){
    let el=document.getElementById('global-err');
    if(!el){el=document.createElement('div');el.id='global-err';el.className='error';document.querySelector('main').prepend(el);}
    el.textContent='⚠ '+msg;setTimeout(()=>el.remove(),4000);
  }

  let curPage='pronostiek';
  function nav_(page){
    curPage=page;
    document.querySelectorAll('#main-nav button').forEach(b=>b.classList.remove('active'));
    const idx={'pronostiek':0,'standen':1,'ranking':2,'scores':3};
    document.querySelectorAll('#main-nav button')[idx[page]]?.classList.add('active');
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+page).classList.add('active');
    renderCurrent();
  }
  // Expose nav globally
  window.nav=nav_;

  function renderCurrent(){
    if(curPage==='pronostiek')renderPredPage();
    if(curPage==='standen')renderStandings();
    if(curPage==='scores')renderScoresPage();
    if(curPage==='ranking')renderRanking();
  }

  function resolveTeam(name){return bracket[name]||name;}

  function renderPhaseBtns(containerId,active,setter){
    document.getElementById(containerId).innerHTML=PHASES.map(ph=>`<button class="ph${active===ph.id?' active':''}" onclick="${setter}('${ph.id}')">${ph.label}</button>`).join('');
  }

  async function renderPredPage(){
    renderPhaseBtns('phase-bar-v',curPhaseV,'setPhaseV');
    const wrap=document.getElementById('matches-wrap');
    if(curPhaseV==='bonus'){
      wrap.innerHTML='<div class="loading"><span class="spinner"></span>Laden...</div>';
      try{bonusPred=await apiFetch('/bonus');renderBonusForm(wrap);}
      catch(e){wrap.innerHTML=`<div class="error">${e.message}</div>`;}
      return;
    }
    wrap.innerHTML='<div class="loading"><span class="spinner"></span>Laden...</div>';
    try{curPreds=await apiFetch('/predictions');renderMatchList(wrap);}
    catch(e){wrap.innerHTML=`<div class="error">${e.message}</div>`;}
  }

  function setPhaseV(ph){curPhaseV=ph;renderPredPage();}
  function setPhaseS(ph){curPhaseS=ph;renderScoresPage();}
  window.setPhaseV=setPhaseV;window.setPhaseS=setPhaseS;

  function renderBonusForm(wrap){
    const champLocked=bonusResult.champion!=null;
    const tsLocked=bonusResult.topscorer!=null;
    wrap.innerHTML=`
      <div class="bonus-card">
        <h3>🏆 Wereldkampioen <small style="font-weight:400;color:var(--text3)">= 10 pt</small></h3>
        <div class="bonus-field">
          <label>Welk land wint het WK?</label>
          <select id="bon-champion" onchange="saveBonus()" ${champLocked?'disabled':''}>
            <option value="">— Kies een land —</option>
            ${TEAMS.sort().map(t=>`<option value="${t}"${bonusPred.champion===t?' selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        ${champLocked?'<div class="info-box" style="margin-top:8px">✓ Vergrendeld</div>':''}
      </div>
      <div class="bonus-card">
        <h3>⚽ Topscorer <small style="font-weight:400;color:var(--text3)">= 5 pt / 8 pt met exact aantal</small></h3>
        <div class="bonus-field">
          <label>Naam topscorer</label>
          <input type="text" id="bon-topscorer" value="${esc(bonusPred.topscorer||'')}" placeholder="Naam speler..." maxlength="40" ${tsLocked?'disabled':''} onchange="saveBonus()">
        </div>
        <div class="bonus-field">
          <label>Aantal doelpunten</label>
          <input type="number" id="bon-goals" min="0" max="20" value="${bonusPred.goals!=null?bonusPred.goals:''}" placeholder="0" ${tsLocked?'disabled':''} onchange="saveBonus()">
        </div>
        ${tsLocked?'<div class="info-box" style="margin-top:8px">✓ Vergrendeld</div>':''}
      </div>
      <div class="bonus-saved" id="bonus-saved"></div>`;
  }
  window.saveBonus=async function(){
    const champion=document.getElementById('bon-champion')?.value||'';
    const topscorer=document.getElementById('bon-topscorer')?.value||'';
    const goals=document.getElementById('bon-goals')?.value;
    clearTimeout(savingTimer['bonus']);
    savingTimer['bonus']=setTimeout(async()=>{
      try{
        await apiFetch('/bonus',{method:'PUT',body:JSON.stringify({champion,topscorer,goals:goals!==''?+goals:null})});
        const sv=document.getElementById('bonus-saved');
        if(sv){sv.textContent='✓ Opgeslagen';setTimeout(()=>{if(sv)sv.textContent='';},2000);}
      }catch(e){showError(e.message);}
    },600);
  };

  function renderMatchList(wrap){
    const filtered=MATCHES.filter(m=>m.ph===curPhaseV);
    const byDate={};
    filtered.forEach(m=>(byDate[m.date]=byDate[m.date]||[]).push(m));
    wrap.innerHTML=Object.entries(byDate).sort(([a],[b])=>a<b?-1:1).map(([date,ms])=>{
      const d=new Date(date+'T12:00:00');
      const lbl=`${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
      return`<div class="date-hdr">${lbl}</div>`+ms.map(m=>{
        const pred=curPreds[m.id]||{};
        const res=results[m.id];
        const locked=isLocked(m.ko);
        let badge='';
        if(res&&pred.h!=null){
          const p=calcPts(pred,res);
          badge=p===3?'<span class="badge badge-exact">3 pt</span>':p===1?'<span class="badge badge-win">1 pt</span>':'<span class="badge badge-zero">0 pt</span>';
        }
        const phLbl=m.ph==='group'?`Groep ${m.g}`:PHASES.find(p=>p.id===m.ph)?.label||'';
        const timeStr=`${String(new Date(m.ko).getHours()).padStart(2,'0')}:${String(new Date(m.ko).getMinutes()).padStart(2,'0')}`;
        return`<div class="card${locked?' locked':''}">
          <div class="card-meta">
            <div class="card-meta-left">
              <span>${phLbl}</span>
              ${locked?'<span class="lock-icon">🔒</span>':`<span class="kickoff-time">${timeStr}</span>`}
            </div>
            ${badge}
          </div>
          <div class="match-grid">
            <div class="team">${esc(resolveTeam(m.h))}</div>
            <div class="score-inputs">
              <input type="number" min="0" max="20" value="${pred.h!=null?pred.h:''}" placeholder="–" id="v_${m.id}_h" ${locked?'disabled':''} onchange="queueSavePred('${m.id}',${m.ko})">
              <span class="score-sep">–</span>
              <input type="number" min="0" max="20" value="${pred.a!=null?pred.a:''}" placeholder="–" id="v_${m.id}_a" ${locked?'disabled':''} onchange="queueSavePred('${m.id}',${m.ko})">
            </div>
            <div class="team right">${esc(resolveTeam(m.a))}</div>
          </div>
          <div class="saved-msg" id="sv_${m.id}"></div>
        </div>`;
      }).join('');
    }).join('');
  }

  window.queueSavePred=function(mid,ko){
    if(isLocked(ko))return;
    clearTimeout(savingTimer[mid]);
    savingTimer[mid]=setTimeout(()=>savePred(mid,ko),600);
  };
  async function savePred(mid,ko){
    if(isLocked(ko)){showError('Wedstrijd is al begonnen');return;}
    const h=document.getElementById(`v_${mid}_h`)?.value;
    const a=document.getElementById(`v_${mid}_a`)?.value;
    if(h===''||a==='')return;
    try{
      await apiFetch('/predictions',{method:'PUT',body:JSON.stringify({matchId:mid,h:+h,a:+a,kickoff:ko})});
      curPreds[mid]={h:+h,a:+a};
      const sv=document.getElementById(`sv_${mid}`);
      if(sv){sv.textContent='✓ Opgeslagen';setTimeout(()=>{if(sv)sv.textContent='';},2000);}
    }catch(e){showError(e.message);}
  }

              const pos=i===0?`<span class="pos-badge pos-1">1</span>`:i===1?`<span class="pos-badge pos-2">2</span>`:`<span style="display:inline-block;width:16px;margin-right:4px;text-align:center;font-size:10px;color:var(--text3)">${i+1}</span>`;
              return`<tr class="${i<2?'qualified':''}">
                <td>${pos}${esc(t.name)}</td>
                <td>${t.played}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
                <td>${t.gf}</td><td>${t.ga}</td>
                <td style="color:${t.gd>0?'var(--green)':t.gd<0?'var(--red)':'var(--text2)'}">${t.gd>0?'+':''}${t.gd}</td>
                <td style="font-weight:700;color:var(--navy)">${t.pts}</td>
              </tr>`;
            }).join('')}</tbody>
          </table>
        </div>`;
      }).join('')}</div>`;
    }catch(e){wrap.innerHTML=`<div class="error">${e.message}</div>`;}
  }

  function renderScoresPage(){
    renderPhaseBtns('phase-bar-s',curPhaseS,'setPhaseS');
    const filtered=MATCHES.filter(m=>m.ph===curPhaseS);
    const byDate={};
    filtered.forEach(m=>(byDate[m.date]=byDate[m.date]||[]).push(m));
    const bonusHtml=curPhaseS==='group'?renderBonusResultForm():'';
    document.getElementById('scores-wrap').innerHTML=bonusHtml+Object.entries(byDate).sort(([a],[b])=>a<b?-1:1).map(([date,ms])=>{
      const d=new Date(date+'T12:00:00');
      const lbl=`${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
      return`<div class="date-hdr">${lbl}</div>`+ms.map(m=>{
        const res=results[m.id]||{};
        const timeStr=`${String(new Date(m.ko).getHours()).padStart(2,'0')}:${String(new Date(m.ko).getMinutes()).padStart(2,'0')}`;
        return`<div class="card">
          <div class="card-meta"><span>${m.ph==='group'?`Groep ${m.g}`:''} ${timeStr}</span></div>
          <div class="match-grid">
            <div class="team">${esc(resolveTeam(m.h))}</div>
            <div class="score-inputs">
              <input type="number" min="0" max="20" value="${res.h!=null?res.h:''}" placeholder="–" id="r_${m.id}_h" onchange="queueSaveResult('${m.id}')">
              <span class="score-sep">–</span>
              <input type="number" min="0" max="20" value="${res.a!=null?res.a:''}" placeholder="–" id="r_${m.id}_a" onchange="queueSaveResult('${m.id}')">
            </div>
            <div class="team right">${esc(resolveTeam(m.a))}</div>
          </div>
          <div class="saved-msg" id="sr_${m.id}"></div>
        </div>`;
      }).join('');
    }).join('');
  }

  function renderBonusResultForm(){
    return`<div class="bonus-card">
      <h3>🏆 Admin: bonus resultaten</h3>
      <div class="bonus-field"><label>Wereldkampioen</label>
        <select id="admin-champion" onchange="saveBonusResult()">
          <option value="">— Nog niet bekend —</option>
          ${TEAMS.sort().map(t=>`<option value="${t}"${bonusResult.champion===t?' selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="bonus-field"><label>Topscorer naam</label>
        <input type="text" id="admin-topscorer" value="${esc(bonusResult.topscorer||'')}" placeholder="Naam..." onchange="saveBonusResult()">
      </div>
      <div class="bonus-field"><label>Doelpunten topscorer</label>
        <input type="number" id="admin-goals" min="0" max="20" value="${bonusResult.goals!=null?bonusResult.goals:''}" placeholder="0" onchange="saveBonusResult()">
      </div>
      <div class="bonus-saved" id="admin-bonus-saved"></div>
    </div>`;
  }

  window.saveBonusResult=async function(){
    const champion=document.getElementById('admin-champion')?.value||'';
    const topscorer=document.getElementById('admin-topscorer')?.value||'';
    const goals=document.getElementById('admin-goals')?.value;
    clearTimeout(savingTimer['bonusresult']);
    savingTimer['bonusresult']=setTimeout(async()=>{
      try{
        await apiFetch('/bonus-result',{method:'PUT',body:JSON.stringify({champion,topscorer,goals:goals!==''?+goals:null})});
        bonusResult={champion,topscorer,goals:goals!==''?+goals:null};
        const sv=document.getElementById('admin-bonus-saved');
        if(sv){sv.textContent='✓ Opgeslagen';setTimeout(()=>{if(sv)sv.textContent='';},2000);}
      }catch(e){showError(e.message);}
    },600);
  };

  window.queueSaveResult=function(mid){
    clearTimeout(savingTimer['r_'+mid]);
    savingTimer['r_'+mid]=setTimeout(()=>saveResult(mid),600);
  };
  async function saveResult(mid){
    const h=document.getElementById(`r_${mid}_h`)?.value;
    const a=document.getElementById(`r_${mid}_a`)?.value;
    if(h===''||a==='')return;
    try{
      await apiFetch('/results',{method:'PUT',body:JSON.stringify({matchId:mid,h:+h,a:+a})});
      results[mid]={h:+h,a:+a};
      const sv=document.getElementById(`sr_${mid}`);
      if(sv){sv.textContent='✓ Opgeslagen';setTimeout(()=>{if(sv)sv.textContent='';},2000);}
    }catch(e){showError(e.message);}
  }

  async function renderRanking(){
    const wrap=document.getElementById('ranking-wrap');
    wrap.innerHTML='<div class="loading"><span class="spinner"></span>Berekenen...</div>';
    try{
      const ranking=await apiFetch('/ranking');
      if(!ranking.length){wrap.innerHTML='<div class="loading">Nog geen spelers.</div>';return;}
      const medals=['🥇','🥈','🥉'];
      wrap.innerHTML=`<div class="rank-wrap"><table class="ranking-table">
        <thead><tr><th>#</th><th>Naam</th><th>Stats</th><th style="text-align:right">Punten</th></tr></thead>
        <tbody>${ranking.map((r,i)=>`<tr>
          <td style="font-size:${i<3?'20':'14'}px;width:40px">${i<3?medals[i]:`<span style="color:var(--text3);font-weight:700">${i+1}</span>`}</td>
          <td style="font-weight:${i===0?'700':'500'}">${esc(r.name)}</td>
          <td class="stat-chips"><span>${r.filled} voorsp.</span><span class="badge badge-exact">${r.exact}×3</span><span class="badge badge-win">${r.win}×1</span>${r.bonusPts>0?`<span class="badge badge-bonus">+${r.bonusPts} bonus</span>`:''}</td>
          <td class="pts-cell">${r.pts}</td>
        </tr>`).join('')}</tbody>
      </table></div>`;
    }catch(e){wrap.innerHTML=`<div class="error">${e.message}</div>`;}
  }

  function calcPts(pred,res){
    if(pred.h==null||pred.a==null||res.h==null||res.a==null)return 0;
    if(pred.h===res.h&&pred.a===res.a)return 3;
    const pw=pred.h>pred.a?1:pred.h<pred.a?-1:0;
    const rw=res.h>res.a?1:res.h<res.a?-1:0;
    return pw===rw?1:0;
  }

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
  init();
</script>
</body>
</html>
