    .page { display: none; }

    .info-box { background: var(--accent-bg); border-left: 3px solid var(--navy); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 10px 14px; font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.6; }

    input:focus, select:focus { border-color: var(--navy); }
    button.primary { padding: 9px 18px; background: var(--navy); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: inherit; letter-spacing: .02em; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .chip { display: inline-flex; align-items: center; gap: 5px; background: var(--accent-bg); border: 1px solid var(--border2); border-radius: 20px; padding: 4px 10px 4px 12px; font-size: 13px; color: var(--accent-text); font-weight: 500; }
    .chip button { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; line-height: 1; padding: 0; }

    .phase-bar { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
    .ph { padding: 5px 12px; border: 1px solid var(--border2); border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; background: var(--bg2); color: var(--text2); font-family: inherit; }

    .date-hdr { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; padding: 4px 0; border-bottom: 1px solid var(--border); margin: 16px 0 8px; }
    .date-hdr:first-child { margin-top: 0; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }

    .badge { display: inline-block; border-radius: 4px; font-size: 11px; font-weight: 700; padding: 2px 8px; letter-spacing: .03em; }
    .badge-exact { background: var(--green-bg); color: var(--green-text); }

    let players=[], results={}, curPreds={}, curPhaseV='group', curPhaseS='group', savingTimer={};

    async function apiFetch(path, opts={}) {
      const res = await fetch(API+path, {headers:{'Content-Type':'application/json'}, ...opts});
      if (!res.ok) { const e=await res.json().catch(()=>({error:'Serverfout'})); throw new Error(e.error||'Fout'); }
      return res.json();
    }
    async function loadAll() {
      try { [players,results]=await Promise.all([apiFetch('/players'),apiFetch('/results')]); renderCurrent(); }
      catch(e) { showError(e.message); }
    }
    function showError(msg) {
      let el=document.getElementById('global-err');
      if(!el){el=document.createElement('div');el.id='global-err';el.className='error';document.querySelector('main').prepend(el);}
      el.textContent='⚠ '+msg; setTimeout(()=>el.remove(),4000);
    }
    let curPage='spelers';
    function nav(page) {
      curPage=page;
      document.querySelectorAll('nav button').forEach((b,i)=>b.classList.toggle('active',['spelers','voorspel','scores','ranking'][i]===page));
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      document.getElementById('page-'+page).classList.add('active');
      renderCurrent();
    }
    function renderCurrent() {
      if(curPage==='spelers')renderPlayers();
      if(curPage==='voorspel')renderPredPage();
      if(curPage==='scores')renderScoresPage();
      if(curPage==='ranking')renderRanking();
    }
    function renderPlayers() {
      document.getElementById('chips').innerHTML=players.map(p=>`<span class="chip">${esc(p)}<button onclick="removePlayer('${esc(p)}')" title="Verwijder">×</button></span>`).join('');
      document.getElementById('player-status').textContent=players.length?`${players.length} speler${players.length!==1?'s':''} toegevoegd`:'Nog geen spelers.';
    }
    async function addPlayer() {
      const inp=document.getElementById('inp-player'); const name=inp.value.trim(); if(!name)return; inp.value='';
      try{await apiFetch('/players',{method:'POST',body:JSON.stringify({name})});players.push(name);renderPlayers();}
      catch(e){showError(e.message);}
    }
    async function removePlayer(name) {
      if(!confirm(`"${name}" verwijderen?`))return;
      try{await apiFetch('/players/'+encodeURIComponent(name),{method:'DELETE'});players=players.filter(p=>p!==name);renderPlayers();}
      catch(e){showError(e.message);}
    }
    function renderPhaseBtns(containerId,active,setter) {
      document.getElementById(containerId).innerHTML=PHASES.map(ph=>`<button class="ph${active===ph.id?' active':''}" onclick="${setter}('${ph.id}')">${ph.label}</button>`).join('');
    }
    async function renderPredPage() {
      const sel=document.getElementById('sel-player'); const prev=sel.value;
      sel.innerHTML=players.length?players.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join(''):'<option value="">— voeg eerst spelers toe —</option>';
      if(prev&&players.includes(prev))sel.value=prev;
      renderPhaseBtns('phase-bar-v',curPhaseV,'setPhaseV');
      await loadPredictions();
    }
    async function loadPredictions() {
      const player=document.getElementById('sel-player').value; const wrap=document.getElementById('matches-wrap');
      if(!player){wrap.innerHTML='';return;}
      wrap.innerHTML='<div class="loading"><span class="spinner"></span>Laden...</div>';
      try{curPreds=await apiFetch('/predictions?player='+encodeURIComponent(player));renderMatchList(wrap,player);}
      catch(e){wrap.innerHTML=`<div class="error">${e.message}</div>`;}
    }
    function setPhaseV(ph){curPhaseV=ph;renderPredPage();}
    function setPhaseS(ph){curPhaseS=ph;renderScoresPage();}
    function renderMatchList(wrap,player) {
      const filtered=MATCHES.filter(m=>m.ph===curPhaseV); const byDate={};
      filtered.forEach(m=>(byDate[m.date]=byDate[m.date]||[]).push(m));
      wrap.innerHTML=Object.entries(byDate).sort(([a],[b])=>a<b?-1:1).map(([date,ms])=>{
        const d=new Date(date+'T12:00:00'); const lbl=`${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
        return`<div class="date-hdr">${lbl}</div>`+ms.map(m=>{
          const pred=curPreds[m.id]||{}; const res=results[m.id]; let badge='';
          if(res&&pred.h!=null){const p=calcPts(pred,res);badge=p===3?'<span class="badge badge-exact">3 pt</span>':p===1?'<span class="badge badge-win">1 pt</span>':'<span class="badge badge-zero">0 pt</span>';}
          const phLbl=m.ph==='group'?`Groep ${m.g}`:PHASES.find(p=>p.id===m.ph)?.label||'';
          return`<div class="card"><div class="card-meta"><span>${phLbl}</span>${badge}</div><div class="match-grid"><div class="team">${esc(m.h)}</div><div class="score-inputs"><input type="number" min="0" max="20" value="${pred.h!=null?pred.h:''}" placeholder="–" id="v_${m.id}_h" onchange="queueSavePred('${esc(player)}','${m.id}')"><span class="score-sep">–</span><input type="number" min="0" max="20" value="${pred.a!=null?pred.a:''}" placeholder="–" id="v_${m.id}_a" onchange="queueSavePred('${esc(player)}','${m.id}')"></div><div class="team right">${esc(m.a)}</div></div><div class="saved-msg" id="sv_${m.id}"></div></div>`;
        }).join('');
      }).join('');
    }
    function queueSavePred(player,mid){clearTimeout(savingTimer[mid]);savingTimer[mid]=setTimeout(()=>savePred(player,mid),600);}
    async function savePred(player,mid) {
      const h=document.getElementById(`v_${mid}_h`)?.value; const a=document.getElementById(`v_${mid}_a`)?.value;
      if(h===''||a==='')return;
      try{await apiFetch('/predictions',{method:'PUT',body:JSON.stringify({player,matchId:mid,h:+h,a:+a})});curPreds[mid]={h:+h,a:+a};const sv=document.getElementById(`sv_${mid}`);if(sv){sv.textContent='✓ Opgeslagen';setTimeout(()=>{if(sv)sv.textContent='';},2000);}}
      catch(e){showError(e.message);}
    }
    function renderScoresPage() {
      renderPhaseBtns('phase-bar-s',curPhaseS,'setPhaseS');
      const filtered=MATCHES.filter(m=>m.ph===curPhaseS); const byDate={};
      filtered.forEach(m=>(byDate[m.date]=byDate[m.date]||[]).push(m));
      document.getElementById('scores-wrap').innerHTML=Object.entries(byDate).sort(([a],[b])=>a<b?-1:1).map(([date,ms])=>{
        const d=new Date(date+'T12:00:00'); const lbl=`${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
        return`<div class="date-hdr">${lbl}</div>`+ms.map(m=>{const res=results[m.id]||{};
          return`<div class="card"><div class="match-grid"><div class="team">${esc(m.h)}</div><div class="score-inputs"><input type="number" min="0" max="20" value="${res.h!=null?res.h:''}" placeholder="–" id="r_${m.id}_h" onchange="queueSaveResult('${m.id}')"><span class="score-sep">–</span><input type="number" min="0" max="20" value="${res.a!=null?res.a:''}" placeholder="–" id="r_${m.id}_a" onchange="queueSaveResult('${m.id}')"></div><div class="team right">${esc(m.a)}</div></div><div class="saved-msg" id="sr_${m.id}"></div></div>`;
        }).join('');
      }).join('');
    }
    function queueSaveResult(mid){clearTimeout(savingTimer['r_'+mid]);savingTimer['r_'+mid]=setTimeout(()=>saveResult(mid),600);}
    async function saveResult(mid) {
      const h=document.getElementById(`r_${mid}_h`)?.value; const a=document.getElementById(`r_${mid}_a`)?.value;
      if(h===''||a==='')return;
      try{await apiFetch('/results',{method:'PUT',body:JSON.stringify({matchId:mid,h:+h,a:+a})});results[mid]={h:+h,a:+a};const sv=document.getElementById(`sr_${mid}`);if(sv){sv.textContent='✓ Opgeslagen';setTimeout(()=>{if(sv)sv.textContent='';},2000);}}
      catch(e){showError(e.message);}
    }
    async function renderRanking() {
      const wrap=document.getElementById('ranking-wrap');
      wrap.innerHTML='<div class="loading"><span class="spinner"></span>Berekenen...</div>';
      try{
        const ranking=await apiFetch('/ranking');
        if(!ranking.length){wrap.innerHTML='<div class="loading">Nog geen spelers.</div>';return;}
        const medals=['🥇','🥈','🥉'];
        wrap.innerHTML=`<div class="rank-wrap"><table class="ranking-table"><thead><tr><th>#</th><th>Naam</th><th>Stats</th><th style="text-align:right">Punten</th></tr></thead><tbody>${ranking.map((r,i)=>`<tr><td style="font-size:${i<3?'20':'14'}px;width:40px">${i<3?medals[i]:`<span style="color:var(--text3);font-weight:700">${i+1}</span>`}</td><td style="font-weight:${i===0?'700':'500'};color:${i===0?'var(--navy)':'var(--text)'}">${esc(r.name)}</td><td class="stat-chips">${r.filled} voorsp.&nbsp;<span class="badge badge-exact">${r.exact}×3</span>&nbsp;<span class="badge badge-win">${r.win}×1</span></td><td class="pts-cell">${r.pts}</td></tr>`).join('')}</tbody></table></div>`;
      }catch(e){wrap.innerHTML=`<div class="error">${e.message}</div>`;}
    }
    function calcPts(pred,res) {
      if(pred.h==null||pred.a==null||res.h==null||res.a==null)return 0;
      if(pred.h===res.h&&pred.a===res.a)return 3;
      const pw=pred.h>pred.a?1:pred.h<pred.a?-1:0; const rw=res.h>res.a?1:res.h<res.a?-1:0;
      return pw===rw?1:0;
    }
    function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
    loadAll();
  </script>
</body>
</html>
